services:

  web:
    build: .
    ports:
      - "5000:5000"

    networks:
      - app-network

    labels:
      app: ecommerce
      environment: dev

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: testdb

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - app-network

    labels:
      app: ecommerce
      environment: dev

  redis:
    image: redis:8

    networks:
      - app-network

    labels:
      app: ecommerce
      environment: dev

volumes:
  postgres-data:

networks:
  app-network: